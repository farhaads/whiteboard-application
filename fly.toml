# https://fly.io/docs/reference/configuration/
app = "whiteboard-application"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[env]
  BOARD_DATA_DIR = "/data"
  # Same Fly machine runs nginx + y-websocket + Next; client uses wss://<host>/yjs-ws/
  ENABLE_SAME_ORIGIN_YJS = "1"

# SQLite persistence. `source` must match an existing Fly volume name in this region
# (`fly volumes list -a whiteboard-application`). Change `source` if yours differs.
[mounts]
  source = "data"
  destination = "/data"
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
